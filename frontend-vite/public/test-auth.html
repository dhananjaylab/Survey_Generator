<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Token Test</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
        .section { margin: 20px 0; padding: 15px; background: #252526; border-left: 3px solid #007acc; }
        button { background: #007acc; color: white; border: none; padding: 10px 20px; margin: 5px; cursor: pointer; }
        button:hover { background: #005a9e; }
        .success { color: #4ec9b0; }
        .error { color: #f48771; }
        .warning { color: #dcdcaa; }
        pre { background: #1e1e1e; padding: 10px; overflow-x: auto; border: 1px solid #3e3e42; }
        input { background: #3c3c3c; color: #d4d4d4; border: 1px solid #3e3e42; padding: 8px; width: 300px; }
    </style>
</head>
<body>
    <h1>🔐 Authentication Token Test</h1>
    <p>Use this page to test token storage and API calls</p>

    <div class="section">
        <h2>1. Login</h2>
        <input type="text" id="username" placeholder="Username" value="Deadpool">
        <input type="password" id="password" placeholder="Password" value="">
        <button onclick="testLogin()">Login</button>
        <div id="loginResult"></div>
    </div>

    <div class="section">
        <h2>2. Check Token Storage</h2>
        <button onclick="checkStorage()">Check Storage</button>
        <div id="storageResult"></div>
    </div>

    <div class="section">
        <h2>3. Test API Call</h2>
        <button onclick="testApiCall()">Test Business Overview API</button>
        <div id="apiResult"></div>
    </div>

    <div class="section">
        <h2>4. Clear Storage</h2>
        <button onclick="clearStorage()" style="background: #d16969;">Clear All</button>
        <div id="clearResult"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';

        async function testLogin() {
            const result = document.getElementById('loginResult');
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            result.innerHTML = '<p class="warning">⏳ Logging in...</p>';

            try {
                const response = await fetch(`${API_URL}/api/v1/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Store in both locations (simulating the app)
                    localStorage.setItem('auth-tokens', JSON.stringify(data));
                    
                    const zustandStore = {
                        state: {
                            tokens: data,
                            isAuthenticated: true,
                            user: null,
                            isLoading: false,
                            error: null
                        },
                        version: 0
                    };
                    localStorage.setItem('auth-store', JSON.stringify(zustandStore));

                    result.innerHTML = `
                        <p class="success">✅ Login successful!</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                    
                    // Auto-check storage
                    setTimeout(checkStorage, 500);
                } else {
                    result.innerHTML = `<p class="error">❌ Login failed: ${data.detail}</p>`;
                }
            } catch (error) {
                result.innerHTML = `<p class="error">❌ Error: ${error.message}</p>`;
            }
        }

        function checkStorage() {
            const result = document.getElementById('storageResult');
            
            const authStore = localStorage.getItem('auth-store');
            const authTokens = localStorage.getItem('auth-tokens');

            let html = '<h3>Storage Contents:</h3>';

            if (!authStore && !authTokens) {
                html += '<p class="error">❌ No tokens found in storage</p>';
            } else {
                if (authStore) {
                    html += '<h4 class="success">✅ auth-store (Zustand):</h4>';
                    try {
                        const parsed = JSON.parse(authStore);
                        html += `<pre>${JSON.stringify(parsed, null, 2)}</pre>`;
                        
                        const tokens = parsed.state?.tokens;
                        if (tokens?.access_token) {
                            html += '<p class="success">✅ Token found in auth-store</p>';
                            
                            // Check expiration
                            try {
                                const payload = JSON.parse(atob(tokens.access_token.split('.')[1]));
                                const expiresAt = new Date(payload.exp * 1000);
                                const isValid = expiresAt > new Date();
                                html += `<p>Expires: ${expiresAt.toLocaleString()}</p>`;
                                html += `<p class="${isValid ? 'success' : 'error'}">${isValid ? '✅' : '❌'} Token is ${isValid ? 'valid' : 'expired'}</p>`;
                            } catch (e) {
                                html += '<p class="error">❌ Could not parse token</p>';
                            }
                        } else {
                            html += '<p class="error">❌ No token in auth-store</p>';
                        }
                    } catch (e) {
                        html += `<p class="error">❌ Error parsing: ${e.message}</p>`;
                    }
                }

                if (authTokens) {
                    html += '<h4 class="success">✅ auth-tokens (AuthService):</h4>';
                    try {
                        const parsed = JSON.parse(authTokens);
                        html += `<pre>${JSON.stringify(parsed, null, 2)}</pre>`;
                        
                        if (parsed.access_token) {
                            html += '<p class="success">✅ Token found in auth-tokens</p>';
                        } else {
                            html += '<p class="error">❌ No access_token in auth-tokens</p>';
                        }
                    } catch (e) {
                        html += `<p class="error">❌ Error parsing: ${e.message}</p>`;
                    }
                }
            }

            result.innerHTML = html;
        }

        async function testApiCall() {
            const result = document.getElementById('apiResult');
            result.innerHTML = '<p class="warning">⏳ Testing API call...</p>';

            // Get token
            let token = null;
            
            const authStore = localStorage.getItem('auth-store');
            if (authStore) {
                try {
                    const parsed = JSON.parse(authStore);
                    const tokens = parsed.state?.tokens;
                    if (tokens?.access_token) {
                        token = tokens.access_token;
                        console.log('✅ Token from auth-store');
                    }
                } catch (e) {
                    console.error('Error parsing auth-store:', e);
                }
            }

            if (!token) {
                const authTokens = localStorage.getItem('auth-tokens');
                if (authTokens) {
                    try {
                        const tokens = JSON.parse(authTokens);
                        if (tokens.access_token) {
                            token = tokens.access_token;
                            console.log('✅ Token from auth-tokens');
                        }
                    } catch (e) {
                        console.error('Error parsing auth-tokens:', e);
                    }
                }
            }

            if (!token) {
                result.innerHTML = '<p class="error">❌ No token found. Please login first.</p>';
                return;
            }

            console.log('🔍 Using token:', token.substring(0, 50) + '...');

            try {
                const requestBody = {
                    request_id: 'test-' + Date.now(),
                    project_name: 'Test Project',
                    company_name: 'Test Company',
                    industry: 'Technology',
                    use_case: 'Testing API',
                    llm_model: 'gpt-4o'
                };

                console.log('🚀 Making request to:', `${API_URL}/api/v1/surveys/business-overview`);
                console.log('📦 Request body:', requestBody);
                console.log('🔑 Authorization:', `Bearer ${token.substring(0, 20)}...`);

                const response = await fetch(`${API_URL}/api/v1/surveys/business-overview`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(requestBody)
                });

                console.log('📥 Response status:', response.status);

                const data = await response.json();
                console.log('📥 Response data:', data);

                if (response.ok) {
                    result.innerHTML = `
                        <p class="success">✅ API call successful!</p>
                        <h4>Response:</h4>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    result.innerHTML = `
                        <p class="error">❌ API call failed (Status: ${response.status})</p>
                        <h4>Response:</h4>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                        <h4>Possible Issues:</h4>
                        <ul>
                            <li>Token might be expired</li>
                            <li>Token format might be incorrect</li>
                            <li>Backend might not be running</li>
                            <li>CORS might be blocking the request</li>
                        </ul>
                    `;
                }
            } catch (error) {
                result.innerHTML = `
                    <p class="error">❌ Error: ${error.message}</p>
                    <p>Make sure backend is running on ${API_URL}</p>
                `;
                console.error('Error:', error);
            }
        }

        function clearStorage() {
            localStorage.clear();
            document.getElementById('clearResult').innerHTML = '<p class="success">✅ Storage cleared</p>';
            setTimeout(checkStorage, 500);
        }

        // Auto-check storage on load
        window.onload = checkStorage;
    </script>
</body>
</html>
